name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: issuetracker
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d issuetracker"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/issuetracker
          JWT_SECRET: ci-only-jwt-secret-change-me-1234567890
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
        run: |
          chmod +x ./mvnw
          nohup ./mvnw spring-boot:run > ../backend.log 2>&1 &

      - name: Wait for backend
        shell: bash
        run: |
          for i in {1..60}; do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/8080' 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          cat backend.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev -- --host 127.0.0.1 > ../frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not start in time"
          cat frontend.log
          exit 1

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: app-logs
          path: |
            backend.log
            frontend.log
          retention-days: 30
